<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="EzI_tIBgiYBYotjfgrxxQmw3l5FC7cSssSDX7WDtF2A" />
<meta name="description" content="Chat dengan AI pintar, buat kode, cari ide kreatif, belajar lebih mudah, dan selesaikan berbagai tugas dengan cepat bersama NanszDev AI. Asisten AI modern yang siap membantu kapan saja.">
<meta name="keywords" content="NanszDev AI, AI Chat, Chatbot AI, AI Assistant, Coding, Pemrograman, Kecerdasan Buatan, Belajar, Teknologi">
<meta name="author" content="NanszDev">
<meta name="robots" content="index, follow">
<meta property="og:title" content="NanszDev AI">
<meta property="og:description" content="Chat dengan AI pintar, buat kode, cari ide kreatif, belajar lebih mudah, dan selesaikan berbagai tugas dengan cepat bersama NanszDev AI. Asisten AI modern yang siap membantu kapan saja.">
<meta property="og:image" content="https://nanszdev.github.io/NanszDev-AI/favicon-black.png">
<meta property="og:url" content="https://nanszdev.github.io/">

<title>NanszDev AI</title>

<link rel="stylesheet" href="nanszdev-ai.css">

<link rel="shortcut icon" href="favicon-black.png" type="image/png" />

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<!-- SIDEBAR -->

<div id="sidebar">

<div class="sidebar-header">

<h2>NanszDev AI</h2>

<button id="closeSidebar">
<i class="fa-solid fa-xmark"></i>
</button>

</div>

<div class="sidebar-content">

<button id="newChat" class="side-btn">
<i class="fa-solid fa-plus"></i>
Chat Baru
</button>

<div class="section">

<div class="section-title">

<span>
<i class="fa-solid fa-comments"></i>
Riwayat Chat
</span>

<button id="clearChats">
<i class="fa-solid fa-trash"></i>
</button>

</div>

<div id="chatHistory"></div>

</div>

<div class="section">

<div class="section-title">

<span>
<i class="fa-solid fa-code"></i>
Riwayat Kode
</span>

<button id="clearCodes">
<i class="fa-solid fa-trash"></i>
</button>

</div>

<div id="codeHistory"></div>

</div>

</div>

</div>

<!-- HANDLE DRAG -->

<div id="dragHandle"></div>

<!-- MAIN -->

<div id="main">

<div class="topbar">

<button id="menuBtn">
<i class="fa-solid fa-bars"></i>
</button>

<h3>NanszDev AI</h3>

<select id="modelSelect">

<option value="openai/gpt-4o-mini">
GPT-4o Mini
</option>

<option value="openai/gpt-4.1-mini">
GPT-4.1 Mini
</option>

<option value="deepseek/deepseek-chat">
DeepSeek Chat
</option>

<option value="qwen/qwen3-32b">
Qwen 3 32B
</option>

<option value="google/gemini-2.5-flash">
Gemini Flash
</option>

</select>

</div>

<!-- API KEY -->

<div class="api-box">

<input
type="password"
id="apiKey"
placeholder="Masukkan OpenRouter API Key">

<button id="saveApi">
Simpan
</button>

</div>

<!-- CHAT -->

<div id="chatContainer">

<div class="message ai">

<div class="avatar">
AI
</div>

<div class="bubble">
Halo, Nama saya NanszDev AI. Saya siap membantu.
</div>

</div>

</div>

<!-- INPUT -->

<div class="input-area">

<textarea
id="prompt"
placeholder="Tulis pesan..."
rows="1"></textarea>

<button id="sendBtn">
<i class="fa-solid fa-paper-plane"></i>
</button>

</div>

</div>

<!-- TEMPLATE CODE -->

<template id="codeTemplate">

<div class="code-wrapper">

<div class="code-header">

<span class="lang">
Code
</span>

<button class="copy-btn">
Copy
</button>

</div>

<pre>
<code></code>
</pre>

</div>

</template>

<script src="nanszdev-ai.js"></script>

</body>
</html>
